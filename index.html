<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gayajii Teacher Hub</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #000;
      color: #fff;
    }

    header {
      display: flex;
      justify-content: space-between;
      padding: 15px 30px;
      border-bottom: 2px solid #FFD700;
      position: sticky;
      top: 0;
      background: #000;
    }

    .logo {
      color: #FFD700;
      font-size: 22px;
      font-weight: bold;
    }

    nav a {
      color: #fff;
      margin-left: 20px;
      text-decoration: none;
    }

    nav a:hover {
      color: #FFD700;
    }

    .hero {
      text-align: center;
      padding: 80px 20px;
    }

    .hero h1 {
      color: #FFD700;
      font-size: 40px;
    }

    .btn {
      background: #FFD700;
      color: #000;
      padding: 12px 25px;
      border: none;
      margin: 10px;
      cursor: pointer;
      border-radius: 5px;
      font-weight: bold;
    }

    section {
      padding: 60px 20px;
      text-align: center;
    }

    h2 {
      color: #FFD700;
      margin-bottom: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .card {
      background: #111;
      padding: 20px;
      border: 1px solid #FFD700;
      border-radius: 10px;
    }

    footer {
      text-align: center;
      padding: 20px;
      border-top: 1px solid #FFD700;
    }
  </style>
</head>

<body>

<header>
  <div class="logo">Gayajii Teacher Hub</div>
  <nav>
    <a href="#home">Home</a>
    <a href="#services">Services</a>
    <a href="#why">Why Us</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<!-- HERO -->
<section id="home" class="hero">
  <h1>Find the Best Teachers Near You</h1>
  <p>Home Tuition | Coaching | School Jobs</p>

  <button class="btn" onclick="goToWhatsAppStudent()">Find Teacher</button>
  <button class="btn" onclick="goToWhatsAppTeacher()">Apply as Teacher</button>
</section>

<!-- SERVICES -->
<section id="services">
  <h2>Our Services</h2>
  <div class="grid">
    <div class="card">Home Tuition</div>
    <div class="card">Coaching Classes</div>
    <div class="card">Teacher Hiring</div>
    <div class="card">School Jobs</div>
  </div>
</section>

<!-- WHY US -->
