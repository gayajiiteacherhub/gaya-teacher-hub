<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gaya Ji Teacher Hub</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI',sans-serif;
}

body{
  background:linear-gradient(135deg,#0A0F1C,#05070F);
  color:#fff;
  overflow-x:hidden;
}

/* GLOW BACKGROUND */
body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:
  radial-gradient(circle at 20% 30%, rgba(0,229,255,0.08), transparent),
  radial-gradient(circle at 80% 70%, rgba(0,229,255,0.05), transparent);
  z-index:-1;
}

/* NAVBAR */
header{
  display:flex;
  justify-content:space-between;
  padding:15px 40px;
  border-bottom:1px solid rgba(0,229,255,0.2);
}

.logo{
  font-size:22px;
  font-weight:bold;
  color:#00E5FF;
  text-shadow:0 0 12px #00E5FF;
}

/* NAV */
nav a{
  margin-left:25px;
  color:#fff;
  text-decoration:none;
  transition:0.3s;
}

nav a:hover{
  color:#00E5FF;
}

/* HERO */
.hero{
  text-align:center;
  padding:100px 20px;
}

.hero h1{
  font-size:42px;
  color:#00E5FF;
  text-shadow:0 0 15px #00E5FF;
}

.tagline{
  margin-top:10px;
  letter-spacing:3px;
  color:#9CA3AF;
}

/* BUTTONS */
.btn{
  margin:15px;
  padding:12px 25px;
  background:#00E5FF;
  color:#000;
  border:none;
  cursor:pointer;
  border-radius:30px;
  font-weight:bold;
  transition:0.3s;
}

.btn:hover{
  box-shadow:0 0 20px #00E5FF, 0 0 40px #00E5FF;
  transform:scale(1.05);
}

/* SECTION */
section{
  padding:60px 20px;
  text-align:center;
}

h2{
  color:#00E5FF;
  margin-bottom:30px;
}

/* CARDS */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.card{
  background:#111827;
  padding:20px;
  border-radius:10px;
  border:1px solid rgba(0,229,255,0.2);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px);
  box-shadow:0 0 15px rgba(0,229,255,0.3);
}

/* FORM */
input, textarea{
  width:90%;
  padding:10px;
  margin:8px;
  border:none;
  border-radius:5px;
}

/* FOOTER */
footer{
  border-top:1px solid rgba(0,229,255,0.2);
  padding:20px;
  text-align:center;
}

/* ANIMATION */
.fade{
  opacity:0;
  transform:translateY(30px);
  transition:0.8s;
}

.show{
  opacity:1;
  transform:translateY(0);
}
</style>
</head>

<body>

<header>
  <div class="logo">🎓 Gaya Ji Teacher Hub</div>
  <nav>
    <a href="#home">Home</a>
    <a href="#services">Services</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<!-- HERO -->
<section class="hero fade" id="home">
  <h1>Connecting Students, Teachers & Opportunities</h1>
  <p class="tagline">Your Trusted Platform in Gaya</p>

  <button class="btn" onclick="goStudent()">Find Teacher</button>
  <button class="btn" onclick="goTeacher()">Apply as Teacher</button>
</section>

<!-- SERVICES -->
<section id="services" class="fade">
  <h2>Our Services</h2>
  <div class="grid">
    <div class="card">Home Tuition</div>
    <div class="card">Coaching Classes</div>
    <div class="card">Teacher Hiring</div>
    <div class="card">School Jobs</div>
  </div>
</section>

<!-- CONTACT -->
<section id="contact" class="fade">
  <h2>Get Started</h2>

  <input type="text" id="name" placeholder="Name">
  <input type="text" id="phone" placeholder="Phone">

  <input type="text" id="class" placeholder="Class / Qualification">
  <input type="text" id="subject" placeholder="Subject">

  <input type="text" id="area" placeholder="Area in Gaya">
  <input type="text" id="budget" placeholder="Budget / Expected Salary">

  <br>

  <button class="btn" onclick="studentMsg()">Find Teacher</button>
  <button class="btn" onclick="teacherMsg()">Apply as Teacher</button>
</section>

<footer>
  © 2026 Gaya Ji Teacher Hub
</footer>

<script>
let number="919523701863";

/* HERO BUTTONS */
function goStudent(){
  let text="Hello, I am looking for a teacher in Gaya. Please assist me.";
  window.open(`https://wa.me/${number}?text=${encodeURIComponent(text)}`);
}

function goTeacher(){
  let text="Hello, I want to apply as a teacher in Gaya. Please guide me.";
  window.open(`https://wa.me/${number}?text=${encodeURIComponent(text)}`);
}

/* FORM */
function studentMsg(){
  let name=document.getElementById("name").value;
  let phone=document.getElementById("phone").value;
  let cls=document.getElementById("class").value;
  let subject=document.getElementById("subject").value;
  let area=document.getElementById("area").value;
  let budget=document.getElementById("budget").value;

  let text=`Student Request:
Name: ${name}
Phone: ${phone}
Class: ${cls}
Subject: ${subject}
Area: ${area}
Budget: ${budget}`;

  window.open(`https://wa.me/${number}?text=${encodeURIComponent(text)}`);
}

function teacherMsg(){
  let name=document.getElementById("name").value;
  let phone=document.getElementById("phone").value;
  let qual=document.getElementById("class").value;
  let subject=document.getElementById("subject").value;
  let area=document.getElementById("area").value;
  let salary=document.getElementById("budget").value;

  let text=`Teacher Application:
Name: ${name}
Phone: ${phone}
Qualification: ${qual}
Subjects: ${subject}
Area: ${area}
Expected Salary: ${salary}

Please attach your resume while sending this message.`;

  window.open(`https://wa.me/${number}?text=${encodeURIComponent(text)}`);
}

/* SCROLL ANIMATION */
let elements=document.querySelectorAll(".fade");

window.addEventListener("scroll",()=>{
  elements.forEach(el=>{
    let pos=el.getBoundingClientRect().top;
    if(pos<window.innerHeight-100){
      el.classList.add("show");
    }
  });
});
</script>

</body>
</html>
